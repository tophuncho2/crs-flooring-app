name: Restore main backup into dev

# Disaster-recovery / refresh. Pulls a main-DB backup from R2 and restores it
# INTO THE DEV DB. Manual only — never scheduled, so it can't clobber dev
# while you're working in it. Never touches main.
#
# Inputs:
#   mode     = latest (newest builderswebapp-*.dump in R2)  |  named (you pass one)
#   filename = exact dump name, only read when mode=named
#
# Safety: before clobbering dev it pg_dumps dev and uploads that as a
# workflow artifact, so a wrong/corrupt restore is reversible.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Which dump to restore"
        type: choice
        options:
          - latest
          - named
        default: latest
      filename:
        description: "Dump filename (only used when mode=named, e.g. builderswebapp-2026-06-01-203941.dump)"
        type: string
        required: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          # Write the ASCII-armored key directly; apt reads .asc via signed-by.
          # Avoids `gpg --dearmor`, which fails in CI ('cannot open /dev/tty').
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc > /dev/null
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          # The runner preinstalls PG16, whose /usr/bin/pg_dump shadows 17.
          # Put the versioned 17 bin dir first on PATH for all later steps.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_restore --version

      - name: Resolve dump to restore
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          MODE: ${{ inputs.mode }}
          FILENAME: ${{ inputs.filename }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "named" ]; then
            if [ -z "${FILENAME:-}" ]; then
              echo "::error::mode=named requires a filename input"; exit 1
            fi
            KEY="$FILENAME"
            # Confirm it actually exists in the bucket before we wipe dev.
            if ! aws s3 ls "s3://${{ secrets.R2_BUCKET_NAME }}/$KEY" \
                  --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}" | grep -q .; then
              echo "::error::$KEY not found in bucket"; exit 1
            fi
          else
            # latest: dumps are timestamped, so lexical sort == chronological.
            KEY="$(aws s3 ls "s3://${{ secrets.R2_BUCKET_NAME }}/" \
                  --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}" \
                  | awk '{print $4}' | grep -E '^builderswebapp-.*\.dump$' | sort | tail -1)"
            if [ -z "$KEY" ]; then
              echo "::error::no builderswebapp-*.dump found in bucket"; exit 1
            fi
          fi
          echo "Selected dump: $KEY"
          echo "DUMP_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Download dump from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          aws s3 cp "s3://${{ secrets.R2_BUCKET_NAME }}/$DUMP_KEY" "./$DUMP_KEY" \
            --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}"
          test "$(stat -c%s "$DUMP_KEY")" -ge 1024

      - name: Safety-dump dev before clobber
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DEV_DATABASE_URL }}
        run: |
          set -euo pipefail
          SAFETY="dev-pre-restore-$(date -u +%Y-%m-%d-%H%M%S).dump"
          pg_dump --format=custom --no-owner --no-acl --file="$SAFETY" "$DATABASE_URL"
          test "$(stat -c%s "$SAFETY")" -ge 1024
          echo "SAFETY_FILE=$SAFETY" >> "$GITHUB_ENV"

      - name: Upload dev safety dump as artifact
        uses: actions/upload-artifact@v7
        with:
          name: dev-pre-restore
          path: ${{ env.SAFETY_FILE }}
          retention-days: 14

      - name: Restore into dev
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DEV_DATABASE_URL }}
        run: |
          set -euo pipefail
          # --clean --if-exists: drop existing objects first, then recreate from
          # the main dump. --no-owner/--no-acl: ignore role/grant noise.
          pg_restore \
            --no-owner --no-acl \
            --clean --if-exists \
            --dbname="$DATABASE_URL" \
            "$DUMP_KEY"

      - name: Summary
        run: |
          echo "✅ Restored $DUMP_KEY into the DEV database."
          echo "   Dev's prior state saved as artifact 'dev-pre-restore' ($SAFETY_FILE)."
