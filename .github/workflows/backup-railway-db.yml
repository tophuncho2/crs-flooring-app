name: Backup Railway DB to R2

on:
  schedule:
    # 03:00 UTC daily (= 11:00pm EDT / 10:00pm EST). Only fires from default branch.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          # Write the ASCII-armored key directly; apt reads .asc via signed-by.
          # Avoids `gpg --dearmor`, which fails in CI ('cannot open /dev/tty').
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc > /dev/null
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          pg_dump --version

      - name: Dump Railway database
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          set -euo pipefail
          FILE="builderswebapp-$(date -u +%Y-%m-%d-%H%M%S).dump"
          pg_dump \
            --format=custom \
            --no-owner \
            --no-acl \
            --file="$FILE" \
            "$DATABASE_URL"
          ls -lh "$FILE"
          # Guard against silent partial failures.
          test "$(stat -c%s "$FILE")" -ge 1024
          echo "DUMP_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Upload dump to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail
          aws s3 cp "$DUMP_FILE" \
            "s3://${{ secrets.R2_BUCKET_NAME }}/$DUMP_FILE" \
            --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}"

      - name: Summary
        run: |
          echo "✅ Uploaded $DUMP_FILE to s3://${{ secrets.R2_BUCKET_NAME }}/"
