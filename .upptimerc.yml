owner: tophuncho2
repo: builderswebapp

sites:
  - name: Web App (staging)
    url: https://builders-app-staging.up.railway.app/api/health
    expectedStatusCodes:
      - 200
  - name: Relay (staging)
    url: https://tsx-flooring-relay-staging.up.railway.app/healthz
    expectedStatusCodes:
      - 200

status-website:
  baseUrl: /builderswebapp
  name: Builders Webapp Status
  introTitle: Builders Webapp service status
  introMessage: |
    Monitored every 5 minutes via Upptime + GitHub Actions.
    Staging environment only — main not yet wired up.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/tophuncho2/builderswebapp

assignees:
  - tophuncho2

# Upptime updates the README between these markers only; everything outside
# is preserved. Add the markers to README.md before the first Summary run.
summaryStartHtmlComment: "<!--start: status pages-->"
summaryEndHtmlComment: "<!--end: status pages-->"

commitMessages:
  readmeContent: ":pencil: Update summary in README [skip ci]"
  summaryJson: ":card_file_box: Update status summary [skip ci]"
  statusChange: "$EMOJI $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms) [skip ci]"
  graphsUpdate: ":bar_chart: Update graphs [skip ci]"
  commitAuthorName: "Upptime Bot"
  commitAuthorEmail: "73812536+upptime-bot@users.noreply.github.com"
